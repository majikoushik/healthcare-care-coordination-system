services:
  patient-api:
    container_name: patient-api
    build:
      context: .
      dockerfile: src/services/Dockerfile
      args:
        SERVICE_PROJECT: src/services/Patient.Api/Patient.Api.csproj
        SERVICE_DLL: Patient.Api.dll
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      # Fix 3: ASP.NET Core reads ConnectionStrings:DefaultConnection via the
      # double-underscore env var convention (not the flat SQL_CONNECTION_STRING)
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      AI_PROVIDER: Mock
      # Fix 9: Security config binding — use double-underscore for nested section
      Security__Mode: ${Security__Mode:-Demo}
      Security__AllowDemoHeaders: ${Security__AllowDemoHeaders:-true}
      Security__DefaultDemoRole: ${Security__DefaultDemoRole:-CareCoordinator}
      # Fix 4: Audit API base URL — inside Docker, localhost resolves to the
      # container itself, not the audit-api service.
      AuditApi__BaseUrl: http://audit-api:8080
    ports:
      - "5080:8080"
    networks:
      - healthcare-network
    depends_on:
      sqlserver:
        condition: service_healthy

  provider-api:
    container_name: provider-api
    build:
      context: .
      dockerfile: src/services/Dockerfile
      args:
        SERVICE_PROJECT: src/services/Provider.Api/Provider.Api.csproj
        SERVICE_DLL: Provider.Api.dll
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      AI_PROVIDER: Mock
      Security__Mode: ${Security__Mode:-Demo}
      Security__AllowDemoHeaders: ${Security__AllowDemoHeaders:-true}
      Security__DefaultDemoRole: ${Security__DefaultDemoRole:-CareCoordinator}
      AuditApi__BaseUrl: http://audit-api:8080
    ports:
      - "5081:8080"
    networks:
      - healthcare-network
    depends_on:
      sqlserver:
        condition: service_healthy

  appointment-api:
    container_name: appointment-api
    build:
      context: .
      dockerfile: src/services/Dockerfile
      args:
        SERVICE_PROJECT: src/services/Appointment.Api/Appointment.Api.csproj
        SERVICE_DLL: Appointment.Api.dll
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      AI_PROVIDER: Mock
      Security__Mode: ${Security__Mode:-Demo}
      Security__AllowDemoHeaders: ${Security__AllowDemoHeaders:-true}
      Security__DefaultDemoRole: ${Security__DefaultDemoRole:-CareCoordinator}
      AuditApi__BaseUrl: http://audit-api:8080
    ports:
      - "5082:8080"
    networks:
      - healthcare-network
    depends_on:
      sqlserver:
        condition: service_healthy

  care-plan-api:
    container_name: care-plan-api
    build:
      context: .
      dockerfile: src/services/Dockerfile
      args:
        SERVICE_PROJECT: src/services/CarePlan.Api/CarePlan.Api.csproj
        SERVICE_DLL: CarePlan.Api.dll
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      COSMOS_MODE: ${COSMOS_MODE:-Mock}
      COSMOS_ENDPOINT: ${COSMOS_ENDPOINT}
      COSMOS_KEY: ${COSMOS_KEY}
      COSMOS_DATABASE: ${COSMOS_DATABASE}
      AI_PROVIDER: Mock
      Security__Mode: ${Security__Mode:-Demo}
      Security__AllowDemoHeaders: ${Security__AllowDemoHeaders:-true}
      Security__DefaultDemoRole: ${Security__DefaultDemoRole:-CareCoordinator}
      AuditApi__BaseUrl: http://audit-api:8080
    ports:
      - "5083:8080"
    networks:
      - healthcare-network

  clinical-insights-api:
    container_name: clinical-insights-api
    build:
      context: .
      dockerfile: src/services/Dockerfile
      args:
        SERVICE_PROJECT: src/services/ClinicalInsights.Api/ClinicalInsights.Api.csproj
        SERVICE_DLL: ClinicalInsights.Api.dll
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      COSMOS_MODE: ${COSMOS_MODE:-Mock}
      COSMOS_ENDPOINT: ${COSMOS_ENDPOINT}
      COSMOS_KEY: ${COSMOS_KEY}
      COSMOS_DATABASE: ${COSMOS_DATABASE}
      CLINICAL_AI_PROVIDER_MODE: ${CLINICAL_AI_PROVIDER_MODE:-Mock}
      AI_PROVIDER: Mock
      Security__Mode: ${Security__Mode:-Demo}
      Security__AllowDemoHeaders: ${Security__AllowDemoHeaders:-true}
      Security__DefaultDemoRole: ${Security__DefaultDemoRole:-CareCoordinator}
      AuditApi__BaseUrl: http://audit-api:8080
    ports:
      - "5084:8080"
    networks:
      - healthcare-network

  audit-api:
    container_name: audit-api
    build:
      context: .
      dockerfile: src/services/Dockerfile
      args:
        SERVICE_PROJECT: src/services/Audit.Api/Audit.Api.csproj
        SERVICE_DLL: Audit.Api.dll
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      COSMOS_MODE: ${COSMOS_MODE:-Mock}
      COSMOS_ENDPOINT: ${COSMOS_ENDPOINT}
      COSMOS_KEY: ${COSMOS_KEY}
      COSMOS_DATABASE: ${COSMOS_DATABASE}
      AI_PROVIDER: Mock
      Security__Mode: ${Security__Mode:-Demo}
      Security__AllowDemoHeaders: ${Security__AllowDemoHeaders:-true}
      Security__DefaultDemoRole: ${Security__DefaultDemoRole:-CareCoordinator}
    ports:
      - "5085:8080"
    networks:
      - healthcare-network

  notification-worker:
    container_name: notification-worker
    build:
      context: .
      dockerfile: src/services/Dockerfile
      args:
        SERVICE_PROJECT: src/services/Notification.Worker/Notification.Worker.csproj
        SERVICE_DLL: Notification.Worker.dll
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      COSMOS_MODE: ${COSMOS_MODE:-Mock}
      COSMOS_ENDPOINT: ${COSMOS_ENDPOINT}
      COSMOS_KEY: ${COSMOS_KEY}
      COSMOS_DATABASE: ${COSMOS_DATABASE}
      AI_PROVIDER: Mock
      Security__Mode: ${Security__Mode:-Demo}
      AuditApi__BaseUrl: http://audit-api:8080
    ports:
      - "5086:8080"
    networks:
      - healthcare-network

  portal:
    container_name: healthcare-care-portal
    build:
      context: src/web/healthcare-care-portal
      dockerfile: Dockerfile
      args:
        VITE_PATIENT_API_URL: ${VITE_PATIENT_API_URL:-http://localhost:5080}
        VITE_PROVIDER_API_URL: ${VITE_PROVIDER_API_URL:-http://localhost:5081}
        VITE_APPOINTMENT_API_URL: ${VITE_APPOINTMENT_API_URL:-http://localhost:5082}
        VITE_CARE_PLAN_API_URL: ${VITE_CARE_PLAN_API_URL:-http://localhost:5083}
        VITE_CLINICAL_INSIGHTS_API_URL: ${VITE_CLINICAL_INSIGHTS_API_URL:-http://localhost:5084}
        VITE_AUDIT_API_URL: ${VITE_AUDIT_API_URL:-http://localhost:5085}
        VITE_NOTIFICATION_API_URL: ${VITE_NOTIFICATION_API_URL:-http://localhost:5086}
    ports:
      - "5173:80"
    networks:
      - healthcare-network

  sqlserver:
    container_name: sqlserver
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQL_SERVER_PASSWORD:-Change_this_password_locally_only}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SQL_SERVER_PASSWORD:-Change_this_password_locally_only}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  cosmos-emulator-placeholder:
    container_name: cosmos-emulator
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    profiles: ["cosmos-emulator"]
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: "3"
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "true"
    ports:
      - "8081:8081"
      - "10251:10251"
      - "10252:10252"
      - "10253:10253"
      - "10254:10254"
    networks:
      - healthcare-network

networks:
  healthcare-network:
    driver: bridge

volumes:
  sqlserver-data:
