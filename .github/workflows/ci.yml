name: ci

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      AI_PROVIDER: Mock
      COSMOS_MODE: Mock
      SECURITY_MODE: Demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore backend projects
        run: |
          find src tests -name "*.csproj" -print0 | xargs -0 -n1 dotnet restore
      - name: Build backend projects
        run: |
          find src -name "*.csproj" -print0 | xargs -0 -n1 dotnet build --configuration Release --no-restore
      - name: Run backend tests
        run: |
          find tests -name "*.csproj" -print0 | xargs -0 -n1 dotnet test --configuration Release

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web/healthcare-care-portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Type check portal
        run: npx tsc --noEmit
      - name: Build portal
        run: npm run build
      - name: Test portal
        run: npm test -- --reporter=verbose

  docker-validation:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Validate Patient API Docker Build
        run: docker build -t test-patient-api -f src/services/Dockerfile --build-arg SERVICE_PROJECT=src/services/Patient.Api/Patient.Api.csproj --build-arg SERVICE_DLL=Patient.Api.dll .
      - name: Validate Portal Docker Build
        run: docker build -t test-portal -f src/web/healthcare-care-portal/Dockerfile src/web/healthcare-care-portal
