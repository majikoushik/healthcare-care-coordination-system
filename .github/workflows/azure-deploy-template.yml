# =============================================================================
# AZURE DEPLOYMENT TEMPLATE (BLUEPRINT)
#
# IMPORTANT: This workflow is an architectural blueprint template demonstrating
# cloud-native deployment patterns. It uses placeholder hello-world container
# images and requires a real Azure subscription, Key Vault, and ACR to function.
#
# To deploy the real application:
# 1. Provide real Azure credentials via secrets.AZURE_CREDENTIALS
# 2. Configure secrets.AZURE_SUBSCRIPTION_ID and secrets.AZURE_REGISTRY_NAME
# 3. Build and push the actual service images to your ACR
# 4. Remove the hello-world image overrides below
# =============================================================================

name: Azure Container Apps Deploy (Template)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      AZURE_CONTAINER_REGISTRY:
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          
      - name: Deploy Bicep
        uses: azure/arm-deploy@v1
        with:
          scope: subscription
          region: eastus
          template: ./infra/bicep/main.bicep
          parameters: ./infra/bicep/parameters/${{ inputs.environment }}.parameters.json
          failOnStdErr: false
          
      - name: Build and Push Patient API
        run: |
          az acr login -n ${{ secrets.AZURE_CONTAINER_REGISTRY }}
          docker build -t ${{ secrets.AZURE_CONTAINER_REGISTRY }}.azurecr.io/patient-api:${{ github.sha }} -f src/services/Dockerfile --build-arg SERVICE_PROJECT=src/services/Patient.Api/Patient.Api.csproj --build-arg SERVICE_DLL=Patient.Api.dll .
          docker push ${{ secrets.AZURE_CONTAINER_REGISTRY }}.azurecr.io/patient-api:${{ github.sha }}
          
      # Additional API builds and container app updates would follow here in a complete production script.
